<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <rect width="600" height="300" fill="#003057"/>
  <!-- PCB grid -->
  <defs>
    <pattern id="pcbGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#B3A369" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="600" height="300" fill="url(#pcbGrid)"/>
  <!-- Traces -->
  <g stroke="#B3A369" stroke-width="2" fill="none" opacity="0.7">
    <polyline points="50,80 100,80 100,150 200,150"/>
    <polyline points="200,150 300,150 300,80 400,80"/>
    <polyline points="400,80 450,80 450,200 350,200"/>
    <polyline points="350,200 250,200 250,240 150,240"/>
    <polyline points="100,150 100,220 180,220"/>
    <polyline points="300,150 300,220 380,220 380,200"/>
    <polyline points="50,200 80,200 80,120"/>
    <polyline points="500,100 550,100 550,180 480,180"/>
    <polyline points="480,180 480,260 400,260"/>
  </g>
  <!-- Vias / pads -->
  <g fill="#B3A369">
    <circle cx="100" cy="150" r="6"/>
    <circle cx="200" cy="150" r="6"/>
    <circle cx="300" cy="150" r="6"/>
    <circle cx="400" cy="80" r="6"/>
    <circle cx="300" cy="80" r="6"/>
    <circle cx="350" cy="200" r="6"/>
    <circle cx="150" cy="240" r="6"/>
    <circle cx="480" cy="180" r="6"/>
    <circle cx="550" cy="100" r="6"/>
  </g>
  <!-- IC chip -->
  <rect x="170" y="110" width="100" height="80" rx="4" fill="#1a3a5c" stroke="#B3A369" stroke-width="2"/>
  <text x="220" y="157" text-anchor="middle" font-family="monospace" font-size="11" fill="#B3A369">IC-01</text>
  <!-- Chip pins -->
  <g fill="#B3A369">
    <rect x="160" y="122" width="12" height="6" rx="1"/>
    <rect x="160" y="135" width="12" height="6" rx="1"/>
    <rect x="160" y="148" width="12" height="6" rx="1"/>
    <rect x="160" y="161" width="12" height="6" rx="1"/>
    <rect x="268" y="122" width="12" height="6" rx="1"/>
    <rect x="268" y="135" width="12" height="6" rx="1"/>
    <rect x="268" y="148" width="12" height="6" rx="1"/>
    <rect x="268" y="161" width="12" height="6" rx="1"/>
  </g>
  <!-- Resistors -->
  <rect x="360" y="74" width="40" height="14" rx="3" fill="#2a4a6c" stroke="#B3A369" stroke-width="1.5"/>
  <text x="380" y="84" text-anchor="middle" font-family="monospace" font-size="8" fill="#B3A369">10kΩ</text>
  <rect x="360" y="194" width="40" height="14" rx="3" fill="#2a4a6c" stroke="#B3A369" stroke-width="1.5"/>
  <text x="380" y="204" text-anchor="middle" font-family="monospace" font-size="8" fill="#B3A369">4.7kΩ</text>
  <!-- Capacitor -->
  <g stroke="#B3A369" stroke-width="2">
    <line x1="478" y1="95" x2="478" y2="105"/>
    <line x1="468" y1="105" x2="488" y2="105"/>
    <line x1="468" y1="112" x2="488" y2="112"/>
    <line x1="478" y1="112" x2="478" y2="122"/>
  </g>
  <text x="498" y="110" font-family="monospace" font-size="9" fill="#B3A369">100µF</text>
  <!-- Label -->
  <text x="300" y="285" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="rgba(179,163,105,0.8)" font-weight="500">Analog Circuit Design Project</text>
</svg>
