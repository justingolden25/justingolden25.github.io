<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <rect width="600" height="300" fill="#f5f4ef"/>
  <!-- Graph axes -->
  <line x1="80" y1="240" x2="380" y2="240" stroke="#003057" stroke-width="2"/>
  <line x1="80" y1="240" x2="80" y2="40" stroke="#003057" stroke-width="2"/>
  <!-- Axis arrows -->
  <polygon points="380,236 380,244 392,240" fill="#003057"/>
  <polygon points="76,40 84,40 80,28" fill="#003057"/>
  <!-- Axis labels -->
  <text x="390" y="244" font-family="'Inter', sans-serif" font-size="12" fill="#003057">t (ms)</text>
  <text x="50" y="36" font-family="'Inter', sans-serif" font-size="12" fill="#003057">V</text>
  <!-- Grid lines -->
  <g stroke="#003057" stroke-width="0.5" opacity="0.2">
    <line x1="80" y1="190" x2="380" y2="190"/>
    <line x1="80" y1="140" x2="380" y2="140"/>
    <line x1="80" y1="90" x2="380" y2="90"/>
    <line x1="155" y1="40" x2="155" y2="240"/>
    <line x1="230" y1="40" x2="230" y2="240"/>
    <line x1="305" y1="40" x2="305" y2="240"/>
  </g>
  <!-- Signal waveform - sine-like with noise -->
  <polyline points="
    80,140 88,120 96,95 104,80 112,85 120,105 128,135 136,155 144,165 152,158
    160,140 168,120 176,97 184,82 192,87 200,108 208,138 216,157 224,164 232,156
    240,140 248,122 256,100 264,84 272,90 280,111 288,140 296,160 304,166 312,155
    320,140 328,121 336,98 344,83 352,89 360,112 368,138 376,155 380,162
  " fill="none" stroke="#B3A369" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Filtered/clean signal overlay -->
  <path d="M80,140 C120,60 160,220 200,140 C240,60 280,220 320,140 C350,80 370,120 380,140"
        fill="none" stroke="#003057" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <!-- Legend -->
  <rect x="400" y="60" width="180" height="80" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="415" y1="85" x2="445" y2="85" stroke="#B3A369" stroke-width="2.5"/>
  <text x="455" y="89" font-family="'Inter', sans-serif" font-size="11" fill="#1a1a2e">Raw signal</text>
  <line x1="415" y1="110" x2="445" y2="110" stroke="#003057" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="455" y="114" font-family="'Inter', sans-serif" font-size="11" fill="#1a1a2e">Filtered output</text>
  <!-- Title -->
  <text x="300" y="280" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#003057" font-weight="600">EEG Signal Processing — Columbia Research</text>
  <!-- Stats boxes -->
  <rect x="400" y="155" width="80" height="50" rx="6" fill="#003057"/>
  <text x="440" y="176" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#B3A369" font-weight="600">SNR</text>
  <text x="440" y="194" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" fill="white" font-weight="700">18.4</text>
  <rect x="495" y="155" width="80" height="50" rx="6" fill="#B3A369"/>
  <text x="535" y="176" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#003057" font-weight="600">BW</text>
  <text x="535" y="194" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" fill="#003057" font-weight="700">40Hz</text>
</svg>
