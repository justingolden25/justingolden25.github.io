<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <rect width="600" height="300" fill="#1a1a2e"/>
  <!-- Window chrome -->
  <rect x="40" y="30" width="520" height="240" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="30" width="520" height="36" rx="10" fill="#161b22"/>
  <rect x="40" y="54" width="520" height="12" fill="#161b22"/>
  <!-- Traffic lights -->
  <circle cx="70" cy="48" r="7" fill="#ff5f57"/>
  <circle cx="92" cy="48" r="7" fill="#ffbd2e"/>
  <circle cx="114" cy="48" r="7" fill="#28c840"/>
  <!-- Filename tab -->
  <rect x="136" y="36" width="120" height="24" rx="4" fill="#0d1117"/>
  <text x="196" y="52" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e">signal_proc.py</text>
  <!-- Code lines -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12">
    <!-- Line 1 -->
    <text x="60" y="90" fill="#6e7681">1</text>
    <text x="80" y="90" fill="#ff7b72">import</text>
    <text x="130" y="90" fill="#e6edf3"> numpy </text>
    <text x="200" y="90" fill="#ff7b72">as</text>
    <text x="225" y="90" fill="#e6edf3"> np</text>
    <!-- Line 2 -->
    <text x="60" y="108" fill="#6e7681">2</text>
    <text x="80" y="108" fill="#ff7b72">import</text>
    <text x="130" y="108" fill="#e6edf3"> scipy.signal </text>
    <text x="260" y="108" fill="#ff7b72">as</text>
    <text x="285" y="108" fill="#e6edf3"> signal</text>
    <!-- Line 3 blank -->
    <text x="60" y="126" fill="#6e7681">3</text>
    <!-- Line 4 -->
    <text x="60" y="144" fill="#6e7681">4</text>
    <text x="80" y="144" fill="#d2a8ff">def</text>
    <text x="112" y="144" fill="#79c0ff"> apply_bandpass</text>
    <text x="270" y="144" fill="#e6edf3">(data, low, high, fs):</text>
    <!-- Line 5 -->
    <text x="60" y="162" fill="#6e7681">5</text>
    <text x="100" y="162" fill="#6e7681">    # Design Butterworth bandpass filter</text>
    <!-- Line 6 -->
    <text x="60" y="180" fill="#6e7681">6</text>
    <text x="100" y="180" fill="#79c0ff">    b</text>
    <text x="118" y="180" fill="#e6edf3">, </text>
    <text x="128" y="180" fill="#79c0ff">a</text>
    <text x="140" y="180" fill="#e6edf3"> = signal.</text>
    <text x="205" y="180" fill="#d2a8ff">butter</text>
    <text x="248" y="180" fill="#e6edf3">(</text>
    <text x="255" y="180" fill="#79c0ff">4</text>
    <text x="265" y="180" fill="#e6edf3">, [low, high], btype=</text>
    <text x="425" y="180" fill="#a5d6ff">'band'</text>
    <text x="477" y="180" fill="#e6edf3">, fs=fs)</text>
    <!-- Line 7 -->
    <text x="60" y="198" fill="#6e7681">7</text>
    <text x="100" y="198" fill="#ff7b72">    return</text>
    <text x="158" y="198" fill="#e6edf3"> signal.</text>
    <text x="208" y="198" fill="#d2a8ff">filtfilt</text>
    <text x="259" y="198" fill="#e6edf3">(b, a, data)</text>
    <!-- Line 8 blank -->
    <text x="60" y="216" fill="#6e7681">8</text>
    <!-- Line 9 -->
    <text x="60" y="234" fill="#6e7681">9</text>
    <text x="80" y="234" fill="#79c0ff">fs</text>
    <text x="100" y="234" fill="#e6edf3"> = </text>
    <text x="118" y="234" fill="#79c0ff">1000</text>
    <text x="150" y="234" fill="#6e7681">  # Sampling rate: 1 kHz</text>
  </g>
  <!-- Cursor -->
  <rect x="80" y="218" width="2" height="14" fill="#58a6ff" opacity="0.9">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
